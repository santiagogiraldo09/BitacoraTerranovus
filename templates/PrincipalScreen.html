<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Bitácora IAC</title>
    <link rel="icon" href="/static/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/PrincipalScreen.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="page-wrapper">
        <div class="login-card">

            <!-- COLUMNA IZQUIERDA -->
            <div class="left-panel">
                <img src="/static/logo.png" alt="Logo IAC" class="logo">
                <div class="left-text">
                    <h1>GESTIÓN DE ACTIVIDADES</h1>
                    <p>Bienvenido al sistema centralizado de gestión de actividades de Ingeniería Asistida Por Computador.</p>
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="right-panel">
                <form class="form" id="loginForm">

                    <div class="field-group">
                        <label for="email">Usuario</label>
                        <input
                            id="email"
                            class="input-field"
                            type="email"
                            name="email"
                            placeholder="Correo o usuario"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <div class="field-group">
                        <label for="password">Contraseña</label>
                        <div class="password-wrapper">
                            <input
                                id="password"
                                class="input-field"
                                type="password"
                                name="password"
                                placeholder="••••••••"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Mostrar contraseña">
                                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-ingresar">Ingresar</button>

                    
                    <!-- <div class="links-row">
                        <a href="{{ url_for('registro') }}" class="link-secondary">Registrarse</a>
                        <button type="button" class="link-secondary link-btn">¿Olvidó su contraseña?</button>
                    </div> -->

                </form>
            </div>

        </div>

        <footer class="footer">
            © 2024 Ingeniería Asistida Por Computador. Todos los derechos reservados.
        </footer>
    </div>

    <div id="toast" style="
        display: none;
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a1a;
        color: white;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        z-index: 9999;
        box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        transition: opacity 0.3s;
    "></div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('stroke', '#FFAF33');
            } else {
                input.type = 'password';
                icon.setAttribute('stroke', '#9ca3af');
            }
        }

        function mostrarToast(mensaje, tipo) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.style.background = tipo === 'error' ? '#ef4444' : '#1a1a1a';
            toast.style.display = 'block';
            toast.style.opacity = '1';

            if (tipo === 'error') {
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.style.display = 'none', 300);
                }, 4000);
            }
            // Si es 'info' no se cierra automáticamente,
            // se queda visible hasta que la página cambie
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            mostrarToast('Validando usuario...', 'info');

            const formData = new FormData(this);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json().catch(() => null);
                if (response.ok || response.redirected) {
                    window.location.href = '/registros';
                } else {
                    mostrarToast('Correo o contraseña incorrectos', 'error');
                }
            } catch (err) {
                mostrarToast('Error de conexión', 'error');
            }
        });

    </script>
</body>
</html>
