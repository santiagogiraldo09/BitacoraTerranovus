<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchro Control — Bitácora IAC</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='styleFormulario.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-wrapper">

    <header class="page-header">
        <button class="btn-back" onclick="window.location.href='/registros'">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div class="header-center">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="IAC" class="header-logo">
            <span class="header-title">Synchro Control</span>
        </div>
    </header>

    <div class="content-scroll">

        <div class="section">
            <div class="section-header">
                <span class="section-icon">
                    <i class="fas fa-folder-open"></i>
                </span>
                <h3 class="section-title">Datos del Proyecto</h3>
            </div>

            <div class="field-group form-group">
                <label class="field-label">Código Proyecto</label>
                <div class="input-with-icon readonly-wrapper">
                    <input type="text" id="form-codigo-proyecto"
                           class="field-input field-readonly" readonly
                           placeholder="Se carga automáticamente">
                    <i class="fas fa-lock lock-icon"></i>
                </div>
            </div>

            <div class="field-group form-group">
                <label class="field-label">Contratista</label>
                <div class="input-with-icon readonly-wrapper">
                    <input type="text" id="form-contratista"
                           class="field-input field-readonly" readonly
                           placeholder="Se carga automáticamente">
                    <i class="fas fa-lock lock-icon"></i>
                </div>
            </div>

            <div class="field-group form-group">
                <label class="field-label">Contrato N°</label>
                <div class="input-with-icon readonly-wrapper">
                    <input type="text" id="form-contrato"
                           class="field-input field-readonly" readonly
                           placeholder="Se carga automáticamente">
                    <i class="fas fa-lock lock-icon"></i>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-icon">
                    <i class="fas fa-clipboard-check"></i>
                </span>
                <h3 class="section-title">Control Calidad Materiales</h3>
            </div>

            <div class="accordion-content" id="container-calidad-materiales" data-api-section="Cumplimientos">
                <button type="button" class="btn-add-row add-item-btn" data-template="template-control-calidad">
                    <i class="fas fa-plus"></i> Añadir fila
                </button>
            </div>
        </div>

        <p class="form-note">
            <i class="fas fa-info-circle"></i>
            Los campos con asterisco (*) son obligatorios. Puede usar el dictado por voz.
        </p>

    </div>

    <div class="bottom-actions">
        <button type="button" id="save-form-button" class="btn-guardar">
            <i class="fas fa-save"></i> Actualizar Formulario
        </button>
        <button type="button" onclick="window.location.href='/registros'" class="btn-cancelar">
            Cancelar
        </button>
    </div>

</div>


<template id="template-control-calidad">
    <div class="dynamic-item-box">

        <div class="fila-header">
            <span class="fila-num"><i class="fas fa-cube"></i> Ítem Material</span>
            <button type="button" class="btn-eliminar-fila delete-item-btn">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>

        <div class="fields-grid-2">
            <div class="field-group form-group">
                <label class="field-label">ITEM *</label>
                <div class="input-with-icon">
                    <input type="number" class="field-input form-input"
                           data-api-name="ITEM" placeholder="N° de ítem">
                </div>
            </div>
            <div class="field-group form-group">
                <label class="field-label">Unidad</label>
                <div class="input-with-icon">
                    <input type="text" class="field-input form-input"
                           data-api-name="Unidad" placeholder="m3, kg...">
                    <button class="record-btn" type="button"><i class="fas fa-microphone"></i></button>
                    <button class="stop-btn" type="button" style="display:none;"><i class="fas fa-stop"></i></button>
                </div>
            </div>
        </div>

        <div class="field-group form-group">
            <label class="field-label">Material</label>
            <div class="input-with-icon">
                <input type="text" class="field-input form-input"
                       data-api-name="Material" placeholder="Descripción del material">
                <button class="record-btn" type="button"><i class="fas fa-microphone"></i></button>
                <button class="stop-btn" type="button" style="display:none;"><i class="fas fa-stop"></i></button>
            </div>
        </div>

        <div class="fields-grid-2">
            <div class="field-group form-group">
                <label class="field-label">Fecha Arribo</label>
                <div class="input-with-icon">
                    <input type="date" class="field-input form-input" data-api-name="Fecha__x0020__Arribo">
                </div>
            </div>
            <div class="field-group form-group">
                <label class="field-label">Proveedor</label>
                <div class="input-with-icon">
                    <input type="text" class="field-input form-input"
                           data-api-name="Proveedor" placeholder="Proveedor">
                    <button class="record-btn" type="button"><i class="fas fa-microphone"></i></button>
                    <button class="stop-btn" type="button" style="display:none;"><i class="fas fa-stop"></i></button>
                </div>
            </div>
        </div>

        <div class="fields-grid-2">
            <div class="field-group form-group">
                <label class="field-label">Cantidad</label>
                <div class="input-with-icon">
                    <input type="number" step="any" class="field-input form-input"
                           data-api-name="Cantidad" placeholder="0.00">
                    <button class="record-btn" type="button"><i class="fas fa-microphone"></i></button>
                    <button class="stop-btn" type="button" style="display:none;"><i class="fas fa-stop"></i></button>
                </div>
            </div>
            <div class="field-group form-group">
                <label class="field-label">Condiciones del Material</label>
                <div class="input-with-icon">
                    <select class="field-input form-input" data-api-name="Condiciones__x0020__del__x0020__Mate">
                        <option value="Bueno">Bueno</option>
                        <option value="Regular">Regular</option>
                        <option value="Malo">Malo</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="fields-grid-2">
            <div class="field-group form-group">
                <label class="field-label">Cumplimiento Especificaciones</label>
                <div class="input-with-icon">
                    <select class="field-input form-input" data-api-name="Cumplimiento__x0020__Especificacione">
                        <option value="SI">SI</option>
                        <option value="NO">NO</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>
            </div>
            <div class="field-group form-group">
                <label class="field-label">Certificación de Calidad</label>
                <div class="input-with-icon">
                    <select class="field-input form-input" data-api-name="Certificaci__x00f3__n__x0020__de__x0">
                        <option value="SI">SI</option>
                        <option value="NO">NO</option>
                        <option value="N/A">N/A</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="field-group form-group">
            <label class="field-label">Observaciones</label>
            <div class="input-with-icon textarea-group">
                <textarea class="field-input form-input"
                          data-api-name="Observaciones"
                          rows="3"
                          placeholder="Observaciones adicionales..."></textarea>
                <button class="record-btn" type="button"><i class="fas fa-microphone"></i></button>
                <button class="stop-btn" type="button" style="display:none;"><i class="fas fa-stop"></i></button>
            </div>
        </div>

    </div>
</template>

<script src="{{ url_for('static', filename='scriptFormulario.js') }}"></script>
</body>
</html>
